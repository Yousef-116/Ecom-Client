<nav class="navbar navbar-expand-lg navbar-dark sticky-top transition-all">
    <div class="container">
        <a class="navbar-brand" routerLink="/">
            <img src="./favicon.ico" alt="Logo" class="logo">
            &nbsp;
            <i class="text-white ">E-Com</i>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse " id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a routerLink="/" class="nav-link" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact:true}">Home</a></li>
                <li class="nav-item"><a routerLink="/shop" class="nav-link" routerLinkActive="active">Shopping</a></li>
                <li class="nav-item"><a routerLink="/about-me" class="nav-link" routerLinkActive="active">About Me</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Best Seller</a></li>
            </ul>

            <ul class="navbar-nav ml-auto align-items-center">

                <li class="nav-item">
                    <a class="nav-link" routerLink="/basket">
                        <i [matBadge]="(basket$ | async)?.basketItems?.length || 0" matBadgeColor="warn"
                            class="material-icons">shopping_cart</i>
                    </a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" role="button">
                        <i class="material-icons">account_circle</i>
                        <span *ngIf="userName$ | async as name">{{ name }}</span>
                    </a>

                    <div [ngClass]="{'show': visible}" class="dropdown-menu dropdown-menu-right">
                        <!-- User not logged in -->
                        <ng-container *ngIf="!(userName$ | async)">
                            <a class="dropdown-item" routerLink="/account/register">
                                Register <i class="fa fa-user-plus"></i>
                            </a>
                            <a class="dropdown-item" routerLink="/account/login">
                                Login <i class="fa fa-sign-in"></i>
                            </a>
                        </ng-container>

                        <!-- User logged in -->
                        <ng-container *ngIf="userName$ | async">
                            <a class="dropdown-item" routerLink="/order">
                                My Orders <i class="fa fa-list"></i>
                            </a>
                            <a class="dropdown-item" (click)="logout()">
                                Logout <i class="fa fa-sign-out"></i>
                            </a>
                        </ng-container>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</nav>
