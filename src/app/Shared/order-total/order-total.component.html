<div class="receipt-container">
    <div class="receipt-edge top"></div>

    <div class="receipt-content">
        <div class="receipt-header">
            <h2 class="pixel-text">ORDER SUMMARY</h2>
            <div class="pixel-divider">................................</div>
            <p class="shipping-note">** SHIPPING ADDED AT END **</p>
        </div>

        @if (basketTotal) {
        <div class="receipt-body">
            <div class="item-row">
                <span><i class="pixel-icon">■</i> SUBTOTAL</span>
                <span class="price">{{basketTotal.subtotal | currency}}</span>
            </div>

            <div class="item-row">
                <span><i class="pixel-icon">▨</i> SHIPPING</span>
                <span class="price">{{basketTotal.shipping | currency}}</span>
            </div>

            <div class="tear-line">--------------------------------</div>

            <div class="item-row total">
                <span class="total-label">TOTAL AMOUNT</span>
                <span class="total-price">{{basketTotal.total | currency}}</span>
            </div>
        </div>
        }

        <div class="barcode">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar short"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <span class="serial-no">#4002-881-2026</span>
        </div>
    </div>
</div>
