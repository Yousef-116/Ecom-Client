<section class="auth-wrapper animate__animated animate__fadeIn">
    <div class="form-card shadow-2xl">
        <div class="form-header">
            <h2 class="animate__animated animate__slideInDown delay-100">Create Account</h2>
            <p class="animate__animated animate__fadeIn delay-200">Join our community and exclusive experience.</p>
        </div>

        <form [formGroup]="RegisterData" class="modern-form" (ngSubmit)="onSubmit()">

            <div class="form-field animate__animated animate__fadeInUp delay-300">
                <label for="userName">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="userName" formControlName="userName" placeholder="David123"
                        [class.is-invalid]="userName.invalid && userName.touched" />
                </div>
            </div>

            <div class="form-field animate__animated animate__fadeInUp delay-300">
                <label for="displayName">Display Name</label>
                <div class="input-wrapper">
                    <input type="text" id="displayName" formControlName="displayName" placeholder="John Doe"
                        [class.is-invalid]="DisplayName.invalid && DisplayName.touched" />
                </div>
            </div>

            <div class="form-field full-width animate__animated animate__fadeInUp delay-400">
                <label for="userEmail">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="userEmail" formControlName="Email" placeholder="name@company.com"
                        [class.is-invalid]="email.invalid && email.touched" />
                </div>
            </div>

            <div class="form-field animate__animated animate__fadeInUp delay-500">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
                        placeholder="••••••••" [class.is-invalid]="Password.invalid && Password.touched" />

                    <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
                        <i class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</i>
                    </button>
                </div>
            </div>

            <div class="form-field animate__animated animate__fadeInUp delay-500">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
                        formControlName="confirmPassword" placeholder="••••••••"
                        [class.is-invalid]="confirmPassword.invalid && confirmPassword.touched" />

                    <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">
                        <i class="material-icons">{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</i>
                    </button>
                </div>
                @if (confirmPassword.hasError('passwordMismatch') && confirmPassword.touched) {
                <span class="error-message">Passwords do not match</span>
                }
            </div>

            <button type="submit" [disabled]="RegisterData.invalid"
                class="submit-btn shadow-lg animate__animated animate__fadeInUp delay-600">
                Register Account
            </button>

            <p class="form-footer animate__animated animate__fadeIn delay-700">
                Already have an Account? <a routerLink="/login">Sign In</a>
            </p>
        </form>
    </div>
</section>
