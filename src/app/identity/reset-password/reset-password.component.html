<section class="auth-wrapper animate__animated animate__fadeIn">
    <div class="form-card shadow-2xl">
        <div class="form-header">
            <h2 class="animate__animated animate__slideInDown delay-100">Reset Password</h2>
            <p class="animate__animated animate__fadeIn delay-200">Please enter your new password below.</p>
        </div>

        <form [formGroup]="ResetPasswordData" class="modern-form" (ngSubmit)="onSubmit()">
            <div class="form-field animate__animated animate__fadeInUp delay-300">
                <label for="Password">New Password</label>
                <div class="input-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" id="Password" formControlName="password"
                        placeholder="••••••••" />
                    <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
                        <i class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</i>
                    </button>
                </div>
            </div>

            <div class="form-field animate__animated animate__fadeInUp delay-400">
                <label for="ConfirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input [type]="showConfirmPassword ? 'text' : 'password'" id="ConfirmPassword"
                        formControlName="confirmPassword" placeholder="••••••••" />
                    <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">
                        <i class="material-icons">{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</i>
                    </button>
                </div>
            </div>

            <button type="submit" [disabled]="ResetPasswordData.invalid"
                class="submit-btn shadow-lg animate__animated animate__fadeInUp delay-500">
                Update Password
            </button>
        </form>
    </div>
</section>
