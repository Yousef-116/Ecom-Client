<form [formGroup]="address" class="address-container">
    <ng-template matStepLabel>Shipping Address</ng-template>

    <h3 class="section-title">Shipping Information</h3>

    <div class="address-grid">
        <mat-form-field appearance="outline" class="half-width">
            <mat-label>First Name</mat-label>
            <input matInput placeholder="e.g. John" formControlName="firstName">
            <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
            <mat-label>Last Name</mat-label>
            <input matInput placeholder="e.g. Doe" formControlName="lastName">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Street Address</mat-label>
            <input matInput placeholder="123 Main St" formControlName="street">
            <mat-icon matPrefix>home</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="city-field">
            <mat-label>City</mat-label>
            <input matInput placeholder="City" formControlName="city">
        </mat-form-field>

        <mat-form-field appearance="outline" class="state-field">
            <mat-label>State</mat-label>
            <input matInput placeholder="State" formControlName="state">
        </mat-form-field>

        <mat-form-field appearance="outline" class="zip-field">
            <mat-label>Zip Code</mat-label>
            <input matInput placeholder="Zip" formControlName="zipCode">
        </mat-form-field>
    </div>

    <div class="actions">
        <button mat-flat-button color="primary" (click)="UpdateAddress()" matStepperNext [disabled]="!address.valid"
            class="next-btn">
            Save & Continue
            <mat-icon>arrow_forward</mat-icon>
        </button>
    </div>
</form>
