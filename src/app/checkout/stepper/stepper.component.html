<button mat-raised-button (click)="isLinear = !isLinear" id="toggle-linear">
    {{!isLinear ? 'Enable linear mode' : 'Disable linear mode'}}
</button>
<mat-stepper [linear]="isLinear" #stepper>

    <mat-step [stepControl]="Address">

        <ng-template matStepLabel>Fill out your Address</ng-template>
        <app-address [address]="Address"></app-address>
    </mat-step>

    <mat-step [stepControl]="DeliveryMethod" label="delivery">

        <ng-template matStepLabel>Select The Delivery Method</ng-template>
        <app-delivery [delivery]="DeliveryMethod"></app-delivery>

            </div>
