<div class="payment-container">
    <h3 class="section-title">Payment Information</h3>

    <form [formGroup]="paymentForm" class="payment-form">
        <div class="row g-4">
            <!-- Name on Card -->
            <div class="col-12">
                <div class="input-wrapper">
                    <label class="input-label">Name on Card</label>
                    <div class="input-inner">
                        <i class="material-icons prefix-icon">person</i>
                        <input
                            [class.is-valid]="paymentForm.get('nameOnCard')?.valid && paymentForm.get('nameOnCard')?.untouched"
                            [class.is-invalid]="paymentForm.get('nameOnCard')?.invalid && paymentForm.get('nameOnCard')?.touched"
                            type="text" formControlName="nameOnCard" placeholder="As shown on your card"
                            class="custom-input">
                    </div>
                </div>
            </div>

            <!-- Card Number -->
            <div class="col-12">
                <div class="input-wrapper">
                    <label class="input-label">Card Number</label>
                    <div class="stripe-input-container" [class.is-focused]="isCardNumberFocused">
                        <i class="material-icons prefix-icon">credit_card</i>
                        <div #cardNumber class="stripe-element"></div>
                    </div>
                </div>
            </div>

            <!-- Expiry and CVC -->
            <div class="col-6">
                <div class="input-wrapper">
                    <label class="input-label">Expiry Date</label>
                    <div class="stripe-input-container" [class.is-focused]="isCardExpiryFocused">
                        <i class="material-icons prefix-icon">event</i>
                        <div #cardExpiry class="stripe-element"></div>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="input-wrapper">
                    <label class="input-label">CVC</label>
                    <div class="stripe-input-container" [class.is-focused]="isCardCvcFocused">
                        <i class="material-icons prefix-icon">lock</i>
                        <div #cardCvc class="stripe-element"></div>
                    </div>
                </div>
            </div>
        </div>

        @if(cardErrors){
        <div class="error-box mt-3 animate__animated animate__shakeX">
            <i class="material-icons">error_outline</i>
            <span>{{cardErrors}}</span>
        </div>
        }
    </form>

    <div class="stepper-actions mt-5">
        <button mat-stroked-button matStepperPrevious class="back-btn">
            <i class="material-icons me-2">arrow_back</i>
            Back
        </button>
        <button [disabled]="cardErrors != null || (loader == true)" mat-flat-button class="pay-btn"
            (click)="submitOrder()">
            @if (loader == true) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Processing...
            } @else {
            Complete Purchase
            <i class="fa fa-cc-stripe ms-2"></i>
            }
        </button>
    </div>
</div>
