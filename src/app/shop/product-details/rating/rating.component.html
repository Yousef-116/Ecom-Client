<div class="rating-section mb-5">
    <hr>

    <div class="section-header d-flex flex-wrap align-items-center justify-content-between gap-4">
        <h3 class="display-6 mb-0">Product Reviews</h3>

        <div *ngIf="ratings.length > 0" class="summary-badge">
            <span class="score">{{averageRating | number:'1.1-1'}}</span>
            <div class="stars">
                <i class="fa fa-star"></i>
            </div>
            <span class="count">({{ratings.length}} reviews)</span>
        </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="ratings.length === 0" class="empty-state mb-5">
        <i class="fa fa-comments-o fa-3x mb-3 d-block opacity-25"></i>
        There are no reviews for this product yet. Be the first to share your experience!
    </div>

    <!-- List of Reviews -->
    <div class="row g-4 mb-5">
        <div class="col-md-6" *ngFor="let rating of ratings">
            <div class="review-card">
                <div class="user-info">
                    <img src="https://ui-avatars.com/api/?name={{rating.username}}&background=0dcaf0&color=fff&bold=true"
                        class="avatar" alt="Avatar">
                    <div class="flex-grow-1">
                        <h5 class="name">{{rating.username}}</h5>
                        <div class="stars">
                            <i class="fa" *ngFor="let star of stars"
                                [ngClass]="star <= rating.score ? 'fa-star' : 'fa-star-o'"></i>
                        </div>
                    </div>
                </div>
                <p class="review-text">{{rating.message}}</p>
            </div>
        </div>
    </div>

    <!-- Add Rating Form -->
    <div class="add-rating-box">
        <h4>Leave a Review</h4>

        <ng-container *ngIf="userName; else loginPrompt">
            <div class="mb-4">
                <label class="form-label">Overall Rating</label>
                <div class="star-rating" (mouseleave)="setHoverScore(0)">
                    <i class="fa" *ngFor="let star of stars"
                        [ngClass]="star <= (hoverScore || newRatingScore) ? 'fa-star' : 'fa-star-o'"
                        (mouseenter)="setHoverScore(star)" (click)="setScore(star)"></i>
                </div>
            </div>

            <div class="mb-4">
                <label for="reviewMessage" class="form-label">Your Message</label>
                <textarea id="reviewMessage" class="form-control" rows="4" [(ngModel)]="newRatingMessage"
                    placeholder="Tell us what you love or how we can improve..."></textarea>
            </div>

            <button class="btn btn-submit" [disabled]="!newRatingScore" (click)="submitRating()">
                <i class="fa fa-paper-plane"></i> Submit Review
            </button>
        </ng-container>

        <ng-template #loginPrompt>
            <div class="login-prompt">
                <i class="fa fa-lock fa-3x mb-3 d-block opacity-25"></i>
                <p>You must be signed in to contribute a review.</p>
                <a routerLink="/account/login" class="btn btn-outline-info btn-login">
                    Sign In to Review
                </a>
            </div>
        </ng-template>
    </div>
</div>
